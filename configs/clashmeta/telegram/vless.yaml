  tls: true
  udp: true
  skip-cert-verify: false
  tcp-fast-open: true
  servername: sni.111000.v6.navy
  flow: ''
  client-fingerprint: chrome
  packet-encoding: xudp
  alpn:
  - h2
  - http/1.1
